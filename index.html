<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>Uji Obaku Plaza AR</title>

<!-- LOCAL LIBRARIES -->

<script src="./libs/aframe.min.js"></script>

<script src="./libs/mindar-image-aframe.prod.js"></script>


<style>

html,body{

margin:0;

width:100%;

height:100%;

overflow:hidden;

touch-action:none;

}

#title{

position:absolute;

top:10px;

left:50%;

transform:translateX(-50%);

z-index:999;

background:rgba(255,255,255,0.85);

padding:10px 20px;

border-radius:15px;

font-family:Arial,sans-serif;

font-size:22px;

font-weight:bold;

text-align:center;

}

#buttons{

position:absolute;

bottom:20px;

width:100%;

display:flex;

justify-content:center;

z-index:999;

}

#infoBtn{

padding:12px 25px;

font-size:16px;

background:#87CEEB;

border:none;

border-radius:10px;

cursor:pointer;

}

#popup{

position:absolute;

bottom:90px;

left:50%;

transform:translateX(-50%);

width:320px;

z-index:999;

background:rgba(255,255,255,0.85);

padding:15px;

border-radius:15px;

font-family:Arial,sans-serif;

font-size:15px;

text-align:center;

display:none;

}

</style>



<script>

AFRAME.registerComponent('pinch-zoom', {

init:function(){

const el=this.el;

let previousDistance=0;

let currentScale=0.02;



function getDistance(t1,t2){

const dx=t1.clientX-t2.clientX;

const dy=t1.clientY-t2.clientY;

return Math.sqrt(

dx*dx+

dy*dy

);

}



window.addEventListener(

"touchstart",

function(e){

if(e.touches.length===2){

previousDistance=

getDistance(

e.touches[0],

e.touches[1]

);

}

},

{passive:true}

);




window.addEventListener(

"touchmove",

function(e){

if(e.touches.length!==2)

return;



const distance=

getDistance(

e.touches[0],

e.touches[1]

);



const delta=

distance

-

previousDistance;



currentScale+=

delta*0.00008;



currentScale=

Math.max(

0.01,

Math.min(

0.08,

currentScale

)

);



el.object3D.scale.set(

currentScale,

currentScale,

currentScale

);



previousDistance=

distance;

},

{passive:true}

);

}

});

</script>


</head>



<body>



<div id="title">

Uji Obaku Plaza

<br>

宇治おうばくプラザ

</div>



<div id="popup">

<b>

Uji Obaku Plaza

<br>

宇治おうばくプラザ

</b>

<br><br>

Uji Obaku Plaza, inaugurated in September 2009, is a multipurpose facility at Kyoto University's Uji Campus featuring Kihada Hall, seminar rooms, collaborative spaces, and dining facilities.

</div>



<div id="buttons">

<button id="infoBtn">

Information

<br>

情報

</button>

</div>



<a-scene

mindar-image="

imageTargetSrc: ./target.mind;

filterMinCF:0.0001;

filterBeta:0.001;

warmupTolerance:5;

missTolerance:5;

maxTrack:1;

"

renderer="

colorManagement:true;

physicallyCorrectLights:true;

precision:mediump;

"

vr-mode-ui="enabled:false"

device-orientation-permission-ui="enabled:false"

>



<a-camera

position="0 0 0"

look-controls="enabled:false">

</a-camera>





<a-entity

mindar-image-target="targetIndex:0">



<!-- AUTOMATIC MUSEUM ROTATION -->

<a-entity

animation="

property: rotation;

to: 0 360 0;

loop: true;

dur: 30000;

easing: linear;

">



<a-entity

id="model"

pinch-zoom

gltf-model="url(model.glb)"

position="0 0.08 0"

rotation="0 -90 0"

scale="0.02 0.02 0.02">

</a-entity>



</a-entity>



</a-entity>



</a-scene>



<script>

let showInfo=false;

document

.getElementById(

"infoBtn"

)

.onclick=function(){

showInfo=!showInfo;

document

.getElementById(

"popup"

)

.style.display=

showInfo

?

"block"

:

"none";

}

</script>



</body>

</html>
